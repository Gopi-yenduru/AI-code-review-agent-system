# =============================================================================
# AI Code Review Agent — Docker Compose
# =============================================================================
# Usage:
#   cp .env.example .env      # Fill in your API keys
#   docker-compose up --build  # Start all services
# =============================================================================

services:
  # ── PostgreSQL Database ──────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: codereview
      POSTGRES_PASSWORD: codereview
      POSTGRES_DB: codereview
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codereview -d codereview"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://codereview:codereview@db:5432/codereview
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend

  # ── React Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local
